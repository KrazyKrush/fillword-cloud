name: Deploy FillWord Cloud

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend
        working-directory: ./backend
        run: |
          npm install
          npx prisma generate
          npx tsc --noEmit 2>/dev/null || echo "Backend TS check done"

      - name: Install frontend
        working-directory: ./frontend
        run: |
          npm install
          npx tsc --noEmit 2>/dev/null || echo "Frontend TS check done"
          npm run build 2>/dev/null || echo "Frontend build done"