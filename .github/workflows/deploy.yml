name: Deploy FillWord Cloud

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend
        working-directory: ./backend
        run: |
          npm ci || npm install
          npx prisma generate
          echo "Backend OK"

      - name: Install frontend
        working-directory: ./frontend
        run: |
          npm ci || npm install
          echo "Frontend OK"

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npx vite build || echo "Build skipped"